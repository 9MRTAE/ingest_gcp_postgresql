name: ingest_gcp_postgresql_ecoapp
 
prefect-version: "3"
 
build: []
push: []
 
pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app
 
# ── Deployments ───────────────────────────────────────────────────────────────
# 1 deployment per db_name (flow file)
# Naming: ingest_{platform}_{db_type}_{db_name}
#
# SA credentials: ดึงจาก GCP Secret Manager ผ่าน get_service_account_credentials()
# ใน config/__init__.py — ไม่ต้อง mount key file หรือตั้ง GOOGLE_APPLICATION_CREDENTIALS
#
# Secret Manager client ใช้ ADC (Application Default Credentials) ของ worker node
# วิธี auth ที่รองรับ (เลือกอย่างใดอย่างหนึ่ง):
#   1. Workload Identity บน GKE  → ไม่ต้องทำอะไรเพิ่ม
#   2. docker-pool บน VM          → ตั้ง GOOGLE_APPLICATION_CREDENTIALS บน host แล้ว
#                                    passthrough ผ่าน env ของ work pool แทนต่อ container
#
# Repair single table via CLI:
#   prefect deployment run \
#     'ingest_gcp_postgresql_announcement_announcement_api_prd/ingest_gcp_postgresql_announcement_announcement_api_prd' \
#     -p TABLE_NAME=post -p JOB_BACKDATE_DEPEN=-3
 
deployments:
 
  # ── announcement_announcement_api_prd ───────────────────────────────────────
  - name: ingest_gcp_postgresql_announcement_announcement_api_prd
    entrypoint: flows/ingest_gcp_postgresql_announcement_announcement_api_prd.py:ingest_gcp_postgresql_announcement_announcement_api_prd
    work_pool:
      name: "{{ $PREFECT_WORK_POOL }}"
      work_queue_name: "{{ $PREFECT_WORK_QUEUE }}"
      job_variables:
        image: "{{ $IMAGE_TAG }}"
        env:
          CI_COMMIT_BRANCH: "{{ $CI_COMMIT_BRANCH }}"
          IMAGE_TAG: "{{ $IMAGE_TAG }}"
          SECRET_PROJECT_ID: "{{ $SECRET_PROJECT_ID }}"
    parameters:
      TABLE_NAME: ""
      JOB_BACKDATE_DEPEN: "-1"
      JOB_STARTDATE_DEPEN: ""
      JOB_ENDDATE_DEPEN: ""
    schedules: []
 
  # ── apollo_api_prd ──────────────────────────────────────────────────────────
  - name: ingest_gcp_postgresql_apollo_api_prd
